<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Online - RM Pangkalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f4ed; }
        .card { background: white; border-radius: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-xl card p-10">
        <header class="text-center mb-10">
            <button onclick="window.location.href='index2.html'" class="mb-6 p-3 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition"><i data-lucide="arrow-left"></i></button>
            <h1 class="text-3xl font-black text-slate-800 leading-tight">Konfirmasi Alamat & Foto Pesanan</h1>
            <p class="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">Validasi Koordinat Pengiriman</p>
        </header>

        <div class="space-y-8">
            <!-- Lokasi Section -->
            <div class="p-6 bg-emerald-50 rounded-3xl border border-emerald-100">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-black text-emerald-600 uppercase">1. Titik Koordinat</span>
                    <button onclick="getGPS()" class="text-[10px] font-black bg-emerald-600 text-white px-4 py-2 rounded-xl">Cek Lokasi</button>
                </div>
                <p id="gps-status" class="text-sm text-slate-500 font-medium italic">Klik tombol untuk mendapatkan lokasi GPS Anda...</p>
            </div>

            <!-- Foto Section -->
            <div class="p-6 bg-slate-50 rounded-3xl border border-slate-200">
                <span class="text-xs font-black text-slate-400 uppercase block mb-4">2. Foto Bukti Alamat (Selfie)</span>
                <div id="photo-preview" class="w-full aspect-video bg-slate-200 rounded-2xl mb-4 flex items-center justify-center overflow-hidden">
                    <i data-lucide="camera" class="text-slate-400 opacity-50" size="40"></i>
                </div>
                <button onclick="startCamera()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm shadow-xl">Ambil Foto Alamat</button>
            </div>

            <button onclick="submitOrder()" class="w-full py-6 bg-[#52bc1a] text-white rounded-[30px] font-black shadow-xl hover:scale-[1.02] active:scale-95 transition">
                KONFIRMASI & KIRIM PESANAN
            </button>
        </div>
    </div>

    <!-- Hidden Camera Element -->
    <div id="cam-container" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col items-center justify-center p-6">
        <video id="v" autoplay playsinline class="w-full max-w-md rounded-3xl mb-8"></video>
        <canvas id="c" class="hidden"></canvas>
        <div class="flex gap-4">
            <button onclick="snap()" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl"><i data-lucide="camera" size="32"></i></button>
            <button onclick="stopCam()" class="w-20 h-20 bg-red-500 text-white rounded-full flex items-center justify-center shadow-2xl"><i data-lucide="x" size="32"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentPos = null;
        let photoData = null;

        function getGPS() {
            const status = document.getElementById('gps-status');
            status.innerText = "Mencari koordinat...";
            navigator.geolocation.getCurrentPosition(p => {
                currentPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                status.innerText = "Lokasi terkunci: " + currentPos.lat.toFixed(4) + ", " + currentPos.lng.toFixed(4);
                status.className = "text-sm text-emerald-600 font-bold";
            }, e => {
                status.innerText = "Gagal: Berikan izin lokasi di browser.";
                status.className = "text-sm text-red-500 font-bold";
            });
        }

        function startCamera() {
            const cont = document.getElementById('cam-container');
            const v = document.getElementById('v');
            cont.classList.remove('hidden');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(s => { v.srcObject = s; })
                .catch(e => { alert("Kamera tidak tersedia."); stopCam(); });
        }

        function stopCam() {
            const v = document.getElementById('v');
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('cam-container').classList.add('hidden');
        }

        function snap() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const ctx = c.getContext('2d');
            c.width = 640; c.height = 480;
            ctx.drawImage(v, 0, 0, 640, 480);
            photoData = c.toDataURL('image/png');
            document.getElementById('photo-preview').innerHTML = `<img src="${photoData}" class="w-full h-full object-cover">`;
            stopCam();
        }

        function submitOrder() {
            if(!currentPos || !photoData) {
                alert("Wajib melengkapi Lokasi GPS dan Foto Selfie Alamat!");
                return;
            }
            alert("Pesanan Online Berhasil Divalidasi! Menghubungkan ke sistem...");
            window.location.href = 'index2.html';
        }
    </script>
</body>
</html>
