<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi - RM Pangkalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: sans-serif; background: #f1f4ed; }</style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white p-10 rounded-[45px] shadow-2xl text-center border-t-8 border-[#52bc1a]">
        <div class="w-24 h-24 bg-emerald-50 text-[#52bc1a] rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="map-pin" size="40"></i></div>
        <h2 class="text-2xl font-black mb-2">Presensi Kehadiran</h2>
        <p id="staff-info" class="text-slate-400 text-sm mb-10 font-bold uppercase tracking-widest">Memuat identitas...</p>
        
        <div class="space-y-4">
            <button onclick="getGPS()" id="btn-gps" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-3">
                <i data-lucide="crosshair"></i> Kunci Lokasi GPS
            </button>
            <button id="btn-submit" disabled onclick="submitAbsen()" class="w-full py-5 bg-slate-200 text-slate-400 rounded-2xl font-bold">Kirim Presensi</button>
        </div>
        <button onclick="window.location.href='index2.html'" class="mt-8 text-xs font-bold text-slate-400 uppercase tracking-widest">Kembali ke Portal</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwN3BrT3us2zAikLxg5T9wmwi8yur5NDXdPU8o45Gn1WBv3uRl9uG4MxE1elZ47vchH/exec";
        const user = JSON.parse(localStorage.getItem('p_user'));
        let currentPos = null;

        if(!user) window.location.href = 'index2.html';
        else document.getElementById('staff-info').innerText = user.Nama + " (" + user.Role + ")";

        function getGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                currentPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                document.getElementById('btn-gps').innerText = "Lokasi Terkunci!";
                document.getElementById('btn-gps').className = "w-full py-5 bg-emerald-100 text-emerald-600 rounded-2xl font-bold";
                document.getElementById('btn-submit').disabled = false;
                document.getElementById('btn-submit').className = "w-full py-5 bg-[#52bc1a] text-white rounded-2xl font-bold shadow-xl";
            });
        }

        async function submitAbsen() {
            alert("Absensi Berhasil dikirim untuk " + user.Nama);
            window.location.href = 'index2.html';
        }
        lucide.createIcons();
    </script>
</body>
</html>
